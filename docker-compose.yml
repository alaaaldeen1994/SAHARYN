version: '3.8'

services:
  # 1. Atmospheric Pipeline (Live NASA/Copernicus Bridge)
  satellite_etl:
    build: .
    restart: always
    command: python services/ingestion/satellite_etl.py
    env_file: .env
    volumes:
      - satellite_cache:/app/data/raw/satellite
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # 2. Industrial Sensor Collector (PI Web API Bridge)
  sensor_collector:
    build: .
    restart: always
    command: python services/ingestion/sensor_collector.py
    env_file: .env
    depends_on:
      - satellite_etl
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # 3. API Gateway & Inference Hub
  api_gateway:
    build: .
    restart: always
    ports:
      - "8000:8000"
    command: python apps/api_gateway/main.py
    env_file: .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  satellite_cache:
