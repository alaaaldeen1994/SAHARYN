# SAHARYN AI — Kubernetes Secrets Template
# ⚠️  DO NOT commit real values here.
# In production, populate these via:
#   kubectl create secret generic saharyn-secrets \
#     --from-env-file=.env -n saharyn
# OR use External Secrets Operator with AWS Secrets Manager / Vault
apiVersion: v1
kind: Secret
metadata:
  name: saharyn-secrets
  namespace: saharyn
  labels:
    app.kubernetes.io/name: saharyn
type: Opaque
stringData:
  SAHARYN_API_KEY: "REPLACE_WITH_REAL_SECRET_IN_PIPELINE"
  DB_PASSWORD: "REPLACE_WITH_REAL_DB_PASSWORD"
  CAMS_API_KEY: "REPLACE_WITH_REAL_CAMS_KEY"
  COP_API_KEY: "REPLACE_WITH_REAL_COPERNICUS_KEY"
